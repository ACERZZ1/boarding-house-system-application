<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="leaflet/leaflet.css"/>
    <script src="leaflet/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    // Read coords from URL hash: map_view.html#lat|lng|title
    // Android loads: file:///android_asset/map_view.html#11.6078|125.4318|My%20House
    var lat = 11.6078, lng = 125.4318, title = "Boarding House";

    var hash = window.location.hash.replace('#', '');
    if (hash) {
      var parts = hash.split('|');
      if (parts.length >= 2) {
        lat   = parseFloat(parts[0]);
        lng   = parseFloat(parts[1]);
        title = parts.length >= 3 ? decodeURIComponent(parts[2]) : "Boarding House";
      }
    }

    var map = L.map('map').setView([lat, lng], 17);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    L.marker([lat, lng])
      .addTo(map)
      .bindPopup('<b>' + title + '</b>')
      .openPopup();

    // Keep initMap() callable from Android JS injection as a fallback
    function initMap(newLat, newLng, newTitle) {
      map.setView([newLat, newLng], 17);
      L.marker([newLat, newLng])
        .addTo(map)
        .bindPopup('<b>' + (newTitle || 'Boarding House') + '</b>')
        .openPopup();
    }
</script>
</body>
</html>
