<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbnb Clone</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

<header class="navbar">
    <div class="logo">airbnb</div>

    <div class="search-bar">
        <span>Anywhere</span>
        <span>Any week</span>
        <span>Add guests</span>
        <button>🔍</button>
    </div>

    <div class="nav-right">
        <span>Airbnb your home</span>
        <div class="profile">☰ 👤</div>
    </div>
</header>

<section class="categories">
    <div>All</div>
    <div>Beach</div>
    <div>Mountain</div>
    <div>Urban</div>
    <div>Luxury</div>
    <a href="post.html">Post your home</a>
</section>

<!-- LISTINGS -->
<section class="listings">

    <!-- SAMPLE LISTING -->
    <a href="details.html?id=1" class="card">
        <img src="https://source.unsplash.com/400x300/?villa">
        <h3 class="listing-title">Malibu, California</h3>
        <p class="listing-desc">Entire villa · 8 guests · 4 bedrooms</p>
        <div class="price-box">
            <span class="price">$850</span>
            <span class="per">night</span>
        </div>
    </a>

    <a href="details.html?id=2" class="card">
        <img src="https://source.unsplash.com/400x300/?apartment">
        <h3 class="listing-title">New York, New York</h3>
        <p class="listing-desc">Entire apartment · 4 guests · 2 bedrooms</p>
        <div class="price-box">
            <span class="price">$320</span>
            <span class="per">night</span>
        </div>
    </a>

</section>

</body>
</html>
